# PostgreSQL — conecta ao servidor já existente no VPS
spring.datasource.url=jdbc:postgresql://localhost:5432/gomes_database
spring.datasource.username=${DB_USER:admin}
spring.datasource.password=${DB_PASSWORD:sua_senha_forte}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Gemini
gemini.api.key=${GEMINI_API_KEY:chave-nao-configurada}

# Porta do backend
server.port=${PORT:8080}
